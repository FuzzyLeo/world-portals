name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: world-portals

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.26.1
          path: gmod-addon-tools

      - name: Checkout GMod-MCP-Server
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/GMod-MCP-Server
          ref: main
          path: GMod-MCP-Server

      - name: Run glua_check
        working-directory: world-portals
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('world-portals/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: world-portals/results.sarif
          checkout_path: ${{ github.workspace }}/world-portals
          category: glua_check

  trigger-doors:
    name: Trigger Doors beta build
    needs: glua-check
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      # Doors' main CI bundles world-portals main HEAD, so a Doors build that
      # started after this commit already carries it - skip the redundant publish.
      - name: Skip if Doors already built since this commit
        id: guard
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: |
          commit_epoch=$(date -d '${{ github.event.head_commit.timestamp }}' +%s)
          last=$(gh api '/repos/AmyJeanes/Doors/actions/workflows/ci.yml/runs?branch=main&per_page=1' \
                   --jq '.workflow_runs[0].created_at // empty')
          if [ -n "$last" ] && [ "$(date -d "$last" +%s)" -gt "$commit_epoch" ]; then
            echo "Doors already built at $last (after this commit) - skipping redundant beta publish."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch Doors beta build
        if: steps.guard.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.TOKEN }}
        run: gh workflow run ci.yml --repo AmyJeanes/Doors --ref main -f publish=true -f addon=beta
