name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run glua_check
        shell: pwsh
        run: ./scripts/glua-check.ps1
