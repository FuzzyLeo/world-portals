name: CI

on:
  pull_request:
    branches:
      - dev
  push:
    branches:
      - dev
      - renovate/*
  workflow_dispatch:

jobs:
  glua-check:
    name: GLua Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: world-portals

      - name: Checkout gmod-addon-tools
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/gmod-addon-tools
          # renovate: datasource=github-tags depName=AmyJeanes/gmod-addon-tools
          ref: v0.25.0
          path: gmod-addon-tools

      - name: Checkout GMod-MCP-Server
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: AmyJeanes/GMod-MCP-Server
          ref: main
          path: GMod-MCP-Server

      - name: Run glua_check
        working-directory: world-portals
        shell: pwsh
        run: ./scripts/glua-check.ps1 -Sarif results.sarif

      - name: Upload SARIF
        if: always() && hashFiles('world-portals/results.sarif') != ''
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4
        with:
          sarif_file: world-portals/results.sarif
          checkout_path: ${{ github.workspace }}/world-portals
          category: glua_check
